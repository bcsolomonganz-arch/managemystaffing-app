name: Deploy ManageMyStaffing to Azure

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Replaces the previous deploy.yml that targeted mms-app-248457 with a
# staging-slot swap. The actual production resource is the App Service
# named 'managemystaffing' (no staging slot). Every push since the rename
# silently failed because the old workflow referenced resources that
# didn't exist. The 2026-05-01 audit caught it.

env:
  AZURE_WEBAPP_NAME: managemystaffing
  PRODUCTION_HOST: www.managemystaffing.com
  NODE_VERSION: '20.x'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      - name: Generate ephemeral test secrets
        run: |
          mkdir -p /tmp/mms-secure
          cat > /tmp/mms-secure/.env <<EOF
          NODE_ENV=test
          PORT=3002
          JWT_SECRET=$(openssl rand -base64 48)
          DATA_ENCRYPTION_KEY=$(openssl rand -hex 32)
          AUDIT_HMAC_KEY=$(openssl rand -hex 32)
          DATA_FILE=/tmp/mms-secure/mms-data.json
          AUDIT_LOG_FILE=/tmp/mms-secure/mms-audit.log
          EOF

      - name: Start server
        run: |
          set -a; . /tmp/mms-secure/.env; set +a
          MMS_SECURE_DIR=/tmp/mms-secure node server.js &
          echo $! > /tmp/server.pid
          for i in {1..30}; do
            if curl -sf http://localhost:3002/health > /dev/null; then break; fi
            sleep 1
          done

      - name: Run smoke tests
        run: npm test

      - name: Run unit tests (lib/punch)
        run: node --test tests/punch.test.js

      - name: Stop test server
        if: always()
        run: kill $(cat /tmp/server.pid) || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --omit=dev

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Wait for app to come up
        run: |
          for i in {1..40}; do
            if curl -sf https://${{ env.PRODUCTION_HOST }}/health > /dev/null; then
              echo "Live at attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Production did not respond at /health within 200s"
          exit 1

      - name: Verify /health/ready (deep check)
        run: |
          ready=$(curl -s https://${{ env.PRODUCTION_HOST }}/health/ready)
          echo "ready: $ready"
          echo "$ready" | grep -q '"ok":true' || (echo "::error::/health/ready returned not ok"; exit 1)
