name: Deploy ManageMyStaffing to Azure

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: mms-app-248457
  STAGING_HOST: mms-app-248457-staging.azurewebsites.net
  PRODUCTION_HOST: www.managemystaffing.com
  NODE_VERSION: '20.x'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      # ─── Tests against an ephemeral local server ───────────────────
      - name: Generate ephemeral test secrets
        run: |
          mkdir -p /tmp/mms-secure
          cat > /tmp/mms-secure/.env <<EOF
          NODE_ENV=test
          PORT=3002
          JWT_SECRET=$(openssl rand -base64 48)
          DATA_ENCRYPTION_KEY=$(openssl rand -hex 32)
          AUDIT_HMAC_KEY=$(openssl rand -hex 32)
          DATA_FILE=/tmp/mms-secure/mms-data.json
          AUDIT_LOG_FILE=/tmp/mms-secure/mms-audit.log
          EOF

      - name: Start server
        run: |
          MMS_SECURE_DIR=/tmp/mms-secure node server.js &
          echo $! > /tmp/server.pid
          for i in {1..30}; do
            if curl -sf http://localhost:3002/health > /dev/null; then break; fi
            sleep 1
          done

      - name: Run smoke tests
        run: npm test

      - name: Stop test server
        if: always()
        run: kill $(cat /tmp/server.pid) || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --omit=dev

      # ─── Step 1: Deploy to STAGING slot ────────────────────────────
      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}
          package: .

      # ─── Step 2: Smoke-test STAGING before swapping ─────────────────
      - name: Smoke-test staging
        run: |
          for i in {1..40}; do
            if curl -sf https://${{ env.STAGING_HOST }}/health > /dev/null; then echo "staging /health OK"; break; fi
            sleep 5
          done
          # Deep readiness probe — verifies audit chain + Key Vault refs + ACS
          ready=$(curl -s https://${{ env.STAGING_HOST }}/health/ready)
          echo "ready: $ready"
          echo "$ready" | grep -q '"ok":true' || (echo "STAGING NOT READY"; exit 1)

      # ─── Step 3: Azure CLI login (for the swap) ────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ─── Step 4: Swap staging ↔ production (atomic, zero-downtime) ─
      - name: Swap staging into production
        run: |
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group managecensus-prod \
            --slot staging \
            --target-slot production

      # ─── Step 5: Verify production is healthy after swap ───────────
      - name: Verify production
        run: |
          for i in {1..30}; do
            if curl -sf https://${{ env.PRODUCTION_HOST }}/health > /dev/null; then echo "Live!"; exit 0; fi
            sleep 5
          done
          echo "Production did not become healthy after swap"; exit 1

      - name: Azure logout
        if: always()
        run: az logout
